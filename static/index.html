<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профориентация - Опрос</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-card {
            transition: all 0.2s ease;
        }

            .option-card:hover {
                transform: translateX(4px);
            }

            .option-card.selected {
                border-color: #6366f1;
                background-color: #eef2ff;
            }

                .option-card.selected .option-text {
                    color: #4338ca;
                    font-weight: 600;
                }

        .progress-bar {
            transition: width 0.5s ease;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
        }

        .check-circle {
            transition: all 0.2s ease;
        }

        .option-card.selected .check-circle {
            border-color: #6366f1;
            background-color: #6366f1;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-lg mb-4">
                <span class="text-3xl">🎯</span>
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent mb-3">
                Профориентация
            </h1>
            <p class="text-gray-600 text-lg max-w-md mx-auto">
                Ответьте на вопросы и узнайте, какая профессиональная сфера вам подходит больше всего
            </p>
        </header>

        <!-- Loading State -->
        <div id="loading" class="text-center py-16">
            <div class="relative">
                <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-200 border-t-indigo-600 mx-auto"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-2xl">📋</span>
                </div>
            </div>
            <p class="mt-6 text-gray-600 font-medium">Загрузка вопросов...</p>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container" class="hidden">
            <!-- Progress Bar -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-600">
                        Вопрос <span id="current-question-num">1</span> из <span id="total-questions">15</span>
                    </span>
                    <span class="text-sm font-medium text-indigo-600" id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="progress-bar bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- Question Card -->
            <div id="question-card" class="glass-effect rounded-2xl shadow-xl p-8 mb-6 fade-in border border-white/50">
                <div class="mb-6">
                    <span class="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-semibold mb-4">
                        Вопрос <span id="question-number">1</span>
                    </span>
                    <h3 id="question-text" class="text-2xl font-semibold text-gray-800 leading-relaxed">
                        Загрузка вопроса...
                    </h3>
                </div>

                <!-- Options -->
                <div id="options-container" class="space-y-3">
                    <!-- Options will be inserted here -->
                </div>

                <!-- Navigation Buttons -->
                <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                    <button id="prev-btn"
                            class="px-6 py-3 rounded-xl font-medium text-gray-600 hover:bg-gray-100 transition duration-200 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                        Назад
                    </button>

                    <button id="next-btn"
                            class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/30 transition duration-200 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none"
                            disabled>
                        <span id="next-btn-text">Далее</span>
                        <svg id="next-btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Container -->
        <div id="result-container" class="hidden">
            <div class="glass-effect rounded-2xl shadow-xl p-8 border border-white/50">
                <!-- Main Result -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full shadow-lg mb-6 animate-bounce">
                        <span class="text-5xl" id="result-icon">🎯</span>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Ваш результат</h2>
                    <p id="result-sphere" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent mb-3"></p>
                    <p id="result-description" class="text-gray-600 text-lg max-w-lg mx-auto leading-relaxed"></p>
                </div>

                <!-- Probabilities Chart -->
                <div class="bg-white/50 rounded-xl p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 text-center">Соответствие сферам</h3>
                    <div id="probabilities-container" class="space-y-4">
                        <!-- Bars will be inserted here -->
                    </div>
                </div>

                <!-- Ranking -->
                <div class="bg-white/50 rounded-xl p-6 mb-8">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 text-center">Рейтинг сфер</h3>
                    <div id="ranking-container" class="space-y-2">
                        <!-- Ranking will be inserted here -->
                    </div>
                </div>

                <!-- Restart Button -->
                <div class="text-center">
                    <button id="restart-btn"
                            class="px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/30 transition duration-200 flex items-center gap-2 mx-auto">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Пройти заново
                    </button>
                </div>
            </div>
        </div>

        <!-- Error Container -->
        <div id="error-container" class="hidden">
            <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
                <div class="text-4xl mb-2">⚠️</div>
                <p class="text-red-600 font-medium" id="error-message"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        let questionsData = null;
        let currentQuestionIndex = 0;
        let answers = [];

        // Иконки для сфер (ключи - category key из questions.json)
        const SPHERE_ICONS_MAP = {
            "analytical": "💻",
            "social": "🤝",
            "creative": "🎨",
            "managerial": "📊",
            "practical": "🔧",
            "research": "🔬",
            "technical": "⚙️",
            "artistic": "🎭",
            "entrepreneurial": "🚀",
            "scientific": "🧪"
        };

        // Градиенты для сфер (ключи - category key)
        const SPHERE_COLORS_MAP = {
            "analytical": "from-blue-500 to-cyan-500",
            "social": "from-green-500 to-emerald-500",
            "creative": "from-purple-500 to-pink-500",
            "managerial": "from-red-500 to-orange-500",
            "practical": "from-orange-500 to-amber-500",
            "research": "from-cyan-500 to-teal-500",
            "technical": "from-slate-500 to-gray-500",
            "artistic": "from-pink-500 to-rose-500",
            "entrepreneurial": "from-emerald-500 to-green-500",
            "scientific": "from-violet-500 to-purple-500"
        };

        const elements = {
            loading: document.getElementById('loading'),
            quizContainer: document.getElementById('quiz-container'),
            questionCard: document.getElementById('question-card'),
            questionNumber: document.getElementById('question-number'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            currentQuestionNum: document.getElementById('current-question-num'),
            totalQuestions: document.getElementById('total-questions'),
            progressPercent: document.getElementById('progress-percent'),
            progressBar: document.getElementById('progress-bar'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            nextBtnText: document.getElementById('next-btn-text'),
            nextBtnIcon: document.getElementById('next-btn-icon'),
            resultContainer: document.getElementById('result-container'),
            resultIcon: document.getElementById('result-icon'),
            resultSphere: document.getElementById('result-sphere'),
            resultDescription: document.getElementById('result-description'),
            probabilitiesContainer: document.getElementById('probabilities-container'),
            rankingContainer: document.getElementById('ranking-container'),
            restartBtn: document.getElementById('restart-btn'),
            errorContainer: document.getElementById('error-container'),
            errorMessage: document.getElementById('error-message')
        };

        async function loadQuestions() {
            try {
                // Добавляем timestamp для отключения кэширования
                const response = await fetch(`${API_URL}/questions?t=${Date.now()}`);
                if (!response.ok) throw new Error('Ошибка загрузки вопросов');
                questionsData = await response.json();

                console.log('Loaded questionsData:', {
                    questionsCount: questionsData.questions.length,
                    selectedCount: questionsData.selected_count,
                    spheresCount: Object.keys(questionsData.spheres || {}).length,
                    spheres: questionsData.spheres
                });

                elements.totalQuestions.textContent = questionsData.selected_count || questionsData.questions.length;
                answers = new Array(questionsData.questions.length).fill(null);

                elements.loading.classList.add('hidden');
                elements.quizContainer.classList.remove('hidden');

                renderQuestion();
            } catch (error) {
                console.error('Error loading questions:', error);
                showError('Не удалось загрузить вопросы. Убедитесь, что сервер запущен.');
            }
        }

        function renderQuestion() {
            const question = questionsData.questions[currentQuestionIndex];
            const totalQuestions = questionsData.selected_count || questionsData.questions.length;

            // Update progress
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            elements.currentQuestionNum.textContent = currentQuestionIndex + 1;
            elements.progressPercent.textContent = Math.round(progress) + '%';
            elements.progressBar.style.width = progress + '%';

            // Update question
            elements.questionNumber.textContent = currentQuestionIndex + 1;
            elements.questionText.textContent = question.text;

            // Render options
            const savedAnswer = answers[currentQuestionIndex];
            elements.optionsContainer.innerHTML = '';

            question.options.forEach((opt, idx) => {
                const isSelected = savedAnswer && savedAnswer.option_id === opt.id;

                const optionDiv = document.createElement('div');
                optionDiv.className = `option-card flex items-center p-4 border-2 rounded-xl cursor-pointer transition duration-200 group ${isSelected ? 'selected' : 'border-gray-200 hover:border-indigo-300'}`;
                optionDiv.dataset.optionId = opt.id;

                optionDiv.innerHTML = `
                    <div class="check-circle flex-shrink-0 w-6 h-6 rounded-full border-2 ${isSelected ? 'border-indigo-500 bg-indigo-500' : 'border-gray-300 group-hover:border-indigo-400'} flex items-center justify-center mr-4">
                        ${isSelected ? '<svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>' : ''}
                    </div>
                    <span class="option-text text-gray-700 font-medium ${isSelected ? 'text-indigo-700' : ''}">${opt.text}</span>
                `;

                optionDiv.addEventListener('click', () => selectOption(opt.id));
                elements.optionsContainer.appendChild(optionDiv);
            });

            // Update buttons
            elements.prevBtn.disabled = currentQuestionIndex === 0;

            if (currentQuestionIndex === questionsData.questions.length - 1) {
                elements.nextBtnText.textContent = 'Получить результат';
                elements.nextBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
            } else {
                elements.nextBtnText.textContent = 'Далее';
                elements.nextBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>';
            }

            updateNextButton();

            // Re-trigger animation
            elements.questionCard.classList.remove('fade-in');
            void elements.questionCard.offsetWidth;
            elements.questionCard.classList.add('fade-in');
        }

        function selectOption(optionId) {
            const question = questionsData.questions[currentQuestionIndex];
            answers[currentQuestionIndex] = {
                question_id: question.id,
                option_id: optionId
            };

            // Update UI immediately without full re-render
            const options = elements.optionsContainer.querySelectorAll('.option-card');
            options.forEach(opt => {
                const isSelected = opt.dataset.optionId === optionId;
                const checkCircle = opt.querySelector('.check-circle');
                const optionText = opt.querySelector('.option-text');

                if (isSelected) {
                    opt.classList.add('selected');
                    opt.classList.remove('border-gray-200', 'hover:border-indigo-300');
                    checkCircle.classList.add('border-indigo-500', 'bg-indigo-500');
                    checkCircle.classList.remove('border-gray-300');
                    checkCircle.innerHTML = '<svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>';
                    optionText.classList.add('text-indigo-700', 'font-semibold');
                } else {
                    opt.classList.remove('selected');
                    opt.classList.add('border-gray-200', 'hover:border-indigo-300');
                    checkCircle.classList.remove('border-indigo-500', 'bg-indigo-500');
                    checkCircle.classList.add('border-gray-300');
                    checkCircle.innerHTML = '';
                    optionText.classList.remove('text-indigo-700', 'font-semibold');
                }
            });

            updateNextButton();
        }

        function updateNextButton() {
            const totalQuestions = questionsData.selected_count || questionsData.questions.length;
            
            if (currentQuestionIndex === totalQuestions - 1) {
                elements.nextBtnText.textContent = 'Получить результат';
                elements.nextBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
            } else {
                elements.nextBtnText.textContent = 'Далее';
                elements.nextBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>';
            }
            
            const hasAnswer = answers[currentQuestionIndex] !== null;
            elements.nextBtn.disabled = !hasAnswer;
        }

        function nextQuestion() {
            const totalQuestions = questionsData.selected_count || questionsData.questions.length;
            
            if (currentQuestionIndex < totalQuestions - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                submitAnswers();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        async function submitAnswers() {
            const totalQuestions = questionsData.selected_count || questionsData.questions.length;
            const validAnswers = answers.filter(a => a !== null);

            if (validAnswers.length !== totalQuestions) {
                showError('Пожалуйста, ответьте на все вопросы');
                return;
            }

            elements.nextBtn.disabled = true;
            elements.nextBtnText.textContent = 'Обработка...';
            elements.nextBtnIcon.innerHTML = '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>';
            elements.nextBtnIcon.classList.add('animate-spin');

            try {
                const response = await fetch(`${API_URL}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answers: validAnswers })
                });

                if (!response.ok) throw new Error('Ошибка отправки ответов');

                const result = await response.json();
                showResult(result);
            } catch (error) {
                showError('Не удалось отправить ответы. Попробуйте позже.');
                elements.nextBtn.disabled = false;
                elements.nextBtnText.textContent = 'Получить результат';
                elements.nextBtnIcon.classList.remove('animate-spin');
                elements.nextBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
            }
        }

        function showResult(result) {
            // Получаем информацию о сфере из серверных данных
            const spheres = questionsData.spheres || {};
            
            console.log('Spheres from server:', spheres);
            console.log('Result primary:', result.primary);
            
            const primarySphere = spheres[result.primary] || {};
            
            elements.resultSphere.textContent = primarySphere.name || result.primary;
            elements.resultIcon.textContent = primarySphere.icon || SPHERE_ICONS_MAP[result.primary] || '🎯';
            elements.resultDescription.textContent = primarySphere.description || '';

            // Probabilities chart
            const categories = Object.entries(result.probabilities)
                .sort((a, b) => b[1] - a[1]);

            elements.probabilitiesContainer.innerHTML = categories.map(([cat, prob]) => {
                const percentage = Math.round(prob * 100);
                const sphereInfo = spheres[cat] || {};
                const name = sphereInfo.name || cat;
                const icon = sphereInfo.icon || SPHERE_ICONS_MAP[cat] || '📌';
                const gradient = SPHERE_COLORS_MAP[cat] || 'from-indigo-500 to-purple-500';

                return `
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">${icon}</span>
                                <span class="font-medium text-gray-700">${name}</span>
                            </div>
                            <span class="font-bold text-gray-900">${percentage}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                            <div
                                class="h-3 rounded-full bg-gradient-to-r ${gradient} transition-all duration-1000 ease-out"
                                style="width: 0%"
                                data-width="${percentage}%"
                            ></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Ranking
            const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣', '9️⃣', '🔟'];
            const colors = [
                'bg-gradient-to-r from-yellow-100 to-amber-100 border-yellow-300',
                'bg-gradient-to-r from-gray-100 to-slate-100 border-gray-300',
                'bg-gradient-to-r from-orange-100 to-amber-100 border-orange-300',
                'bg-gray-50 border-gray-200',
                'bg-gray-50 border-gray-200',
                'bg-gray-50 border-gray-200',
                'bg-gray-50 border-gray-200',
                'bg-gray-50 border-gray-200',
                'bg-gray-50 border-gray-200',
                'bg-gray-50 border-gray-200'
            ];
            
            elements.rankingContainer.innerHTML = result.ranking.map(([cat, prob], index) => {
                const sphereInfo = spheres[cat] || {};
                const name = sphereInfo.name || cat;
                const icon = sphereInfo.icon || SPHERE_ICONS_MAP[cat] || '📌';

                return `
                    <div class="flex items-center justify-between p-4 rounded-xl border-2 ${colors[index] || colors[3]} transition duration-200 hover:shadow-md">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${medals[index] || `${index + 1}.`}</span>
                            <span class="text-xl">${icon}</span>
                            <span class="font-semibold text-gray-800">${name}</span>
                        </div>
                        <span class="font-bold text-indigo-600 text-lg">${Math.round(prob * 100)}%</span>
                    </div>
                `;
            }).join('');

            elements.quizContainer.classList.add('hidden');
            elements.resultContainer.classList.remove('hidden');
            elements.errorContainer.classList.add('hidden');

            // Animate progress bars after showing result
            setTimeout(() => {
                document.querySelectorAll('[data-width]').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 100);
        }

        function showError(message) {
            elements.errorMessage.textContent = message;
            elements.errorContainer.classList.remove('hidden');
            setTimeout(() => {
                elements.errorContainer.classList.add('hidden');
            }, 5000);
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            answers = new Array(questionsData.selected_count || questionsData.questions.length).fill(null);
            elements.resultContainer.classList.add('hidden');
            elements.quizContainer.classList.remove('hidden');
            elements.nextBtnIcon.classList.remove('animate-spin');
            loadQuestions();
        }

        // Event listeners
        elements.nextBtn.addEventListener('click', nextQuestion);
        elements.prevBtn.addEventListener('click', prevQuestion);
        elements.restartBtn.addEventListener('click', restartQuiz);

        // Initialize
        loadQuestions();
    </script>
</body>
</html>
